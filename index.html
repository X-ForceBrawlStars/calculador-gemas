<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Force</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    

    <div class="container">
        <h1 class="title">X-Force</h1>

        <section>
        <h2 class="subtitle">Skins</h2>

        <div class="campo">
            <label for="skinRara">Rara</label>
            <input type="number" id="skinRara" min="0">
        </div>

        <div class="campo">
            <label for="skinSuperRara">Super Rara</label>
            <input type="number" id="skinSuperRara" min="0">
        </div>

        <div class="campo">
            <label for="skinEpica">Épica</label>
            <input type="number" id="skinEpica" min="0">
        </div>

        <div class="campo">
            <label for="skinMitica">Mítica</label>
            <input type="number" id="skinMitica" min="0">
        </div>

        <div class="campo">
            <label for="skinLendaria">Lendária</label>
            <input type="number" id="skinLendaria" min="0">
        </div>

        <div class="campo">
            <label for="skinHyper">Hyper Carga</label>
            <input type="number" id="skinHyper" min="0">
        </div>

        <div class="campo">
            <label for="skinPrateada">Prateada</label>
            <input type="number" id="skinPrateada" min="0">
        </div>

        <div class="campo">
            <label for="skinDourada">Dourada</label>
            <input type="number" id="skinDourada" min="0">
        </div>

        </section>

        <section>
            
        <h2 class="subtitle">Emojis</h2>

        <div class="campo">
            <label for="emojiComum">Comum</label>
            <input type="number" id="emojiComum" min="0">
        </div>

        <div class="campo">
            <label for="emojiRaro">Raro</label>
            <input type="number" id="emojiRaro" min="0">
        </div>

        <div class="campo">
            <label for="emojiEpico">Épico</label>
            <input type="number" id="emojiEpico" min="0">
        </div>

        </section>

        <section>

        <h2 class="subtitle">Outros itens</h2>

        <div class="campo">
            <label for="icone">Ícones</label>
            <input type="number" id="icone" min="0">
        </div>

        <div class="campo">
            <label for="gadget">Acessórios</label>
            <input type="number" id="gadget" min="0">
        </div>

        <div class="campo">
            <label for="starPower">Poderes de estrela</label>
            <input type="number" id="starPower" min="0">
        </div>

        <div class="campo">
            <label for="buffies">Buffies</label>
            <input type="number" id="buffies" min="0">
        </div>

        <div class="campo">
            <label for="hyper">Hypercargas</label>
            <input type="number" id="hyper" min="0">
        </div>

        </section>

        <section>

        <h2 class="subtitle">Brawlers</h2>

        <div class="campo">
            <label for="contBrawler">Total de brawlers</label>
            <input type="number" id="contBrawler" min="0">
        </div>

        <div id="niveisBrawlers">
            
        </div>

        </section>

        <br>

        <div class="btn">
            <button id="calcular">Calcular</button>
        </div>

        <div id="resultado">
            

        </div>

        <a id="btnDetalhes">Detalhes</a>

        <div id="popup">

            <div id="popupConteudo">
                <h3>Detalhes</h3>

                <div id="paginaDetalhes"></div>

                <div id="navegacao">
                    <button id="btnAnterior"><i class="fa-solid fa-arrow-left"></i></button>
                    <span id="contadorPagina">1/2</span>
                    <button id="btnProximo"><i class="fa-solid fa-arrow-right"></i></button>
                </div>

                <button id="btnFechar"><i class="fa-solid fa-xmark"></i></button>

            </div>
            
        </div>

   </div>

   <script src="javascript/script.js"></script>
</body>
</html>
